<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Lista de Tareas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Tu Lista de Tareas</h1>
            <div class="stats">
                <div class="progress-circle">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="50"></circle>
                        <circle class="progress-ring-fill" cx="60" cy="60" r="50" id="progressRing"></circle>
                    </svg>
                    <div class="progress-text">
                        <div class="progress-percentage" id="progressPercentage">0%</div>
                        <div class="progress-label">Completado</div>
                    </div>
                </div>
                <div class="task-counter">
                    <span class="counter-number" id="taskCounter">0/0</span>
                    <span class="counter-label">Tareas Completadas</span>
                </div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-container">
                <input type="text" class="task-input" id="taskInput" placeholder="¿Qué necesitas hacer hoy?">
                <input type="datetime-local" class="datetime-input" id="reminderTime" title="Recordatorio opcional">
                <button class="add-btn" id="addBtn">Agregar</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendientes</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </div>
        </div>

        <div class="tasks-section">
            <div id="tasksList"></div>
        </div>
    </div>

    <!-- aqui ira el audio de las notificaciones para luego guiarme -->
    <audio id="notificationSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" type="audio/wav">
        <!-- sonido -->
    </audio>

    <script src="script.js"></script>
</body>
</html>
